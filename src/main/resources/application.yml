spring:
  application:
    name: restaurant-management-system
  profiles:
    active: dev

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

security:
  jwt:
    secret: ${JWT_SECRET:change-me-in-prod-this-must-be-32-bytes-min}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
